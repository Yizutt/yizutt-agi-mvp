syntax = "proto3";

package yizutt;

service RuntimeService {
  rpc Submit(TaskRequest) returns (TaskReply);
  rpc SubmitStream(TaskRequest) returns (stream TraceEvent);
  rpc PoolStatus(Empty) returns (PoolStatusReply);
}

service WorkerService {
  rpc Execute(TaskRequest) returns (TaskReply);
  rpc ExecuteStream(TaskRequest) returns (stream TraceEvent);
  rpc Health(Empty) returns (WorkerHealth);
}

message Empty {}

message TaskRequest {
  string session_id = 1;
  string task = 2;
  string context_json = 3;
}

message TaskReply {
  string task_id = 1;
  string worker_id = 2;
  string status = 3;
  string output = 4;
  string trace_json = 5;
}

message TraceEvent {
  string task_id = 1;
  string worker_id = 2;
  string event_json = 3;
  bool final_event = 4;
  string status = 5;
  string output = 6;
}

message WorkerHealth {
  string worker_id = 1;
  bool healthy = 2;
  uint32 inflight = 3;
  string checked_at = 4;
  string last_error = 5;
  string worker_kind = 6;
  string sandbox_profile = 7;
  string isolation_status = 8;
}

message WorkerSnapshot {
  string worker_id = 1;
  string address = 2;
  uint32 inflight = 3;
  bool healthy = 4;
  string checked_at = 5;
  string last_error = 6;
  string worker_kind = 7;
  string sandbox_profile = 8;
  string isolation_status = 9;
}

message PoolStatusReply {
  repeated WorkerSnapshot workers = 1;
  uint32 min_workers = 2;
  uint32 max_workers = 3;
  uint32 max_inflight_per_worker = 4;
  uint32 max_runtime_queue_depth = 5;
  uint32 current_inflight = 6;
  uint64 backpressure_rejections = 7;
}
