<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yizutt AGI Panel</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-alt: #eef2f7;
      --text: #17202a;
      --muted: #637083;
      --line: #d9e0ea;
      --accent: #146c63;
      --accent-strong: #0c514a;
      --danger: #b42318;
      --ok: #147a3f;
      --warn: #a15c07;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      min-height: 38px;
      padding: 0 14px;
      white-space: nowrap;
    }

    button.secondary {
      background: #253244;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #ffffff;
      padding: 10px 12px;
    }

    select {
      min-height: 38px;
    }

    #runtimeAddr,
    #sessionId,
    #contextJson {
      direction: ltr;
      text-align: left;
    }

    textarea {
      min-height: 134px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    pre {
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
      color: #26313f;
      direction: ltr;
      text-align: left;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: minmax(200px, 1fr) minmax(240px, 420px) minmax(160px, 220px) auto;
      gap: 14px;
      align-items: end;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .brand span,
    .status-line {
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      max-width: 1240px;
      width: 100%;
      margin: 0 auto;
      padding: 18px 20px 28px;
      display: grid;
      gap: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .panel-body {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .output {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-alt);
      min-height: 150px;
      max-height: 420px;
      overflow: auto;
      padding: 12px;
    }

    .workers,
    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .item-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 650;
      flex-wrap: wrap;
    }

    .item-title button {
      min-height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }

    .item-title span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .badge {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      background: var(--surface-alt);
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.ok {
      color: var(--ok);
      background: #e8f5ee;
    }

    .badge.warn {
      color: var(--warn);
      background: #fff4df;
    }

    .badge.error {
      color: var(--danger);
      background: #fef0ef;
    }

    .muted {
      color: var(--muted);
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      .topbar-inner,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar-inner {
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1>Yizutt AGI Panel</h1>
          <span id="brandSubtitle">本地 Runtime 控制面板</span>
        </div>
        <label id="runtimeLabel">
          Runtime 地址
          <input id="runtimeAddr" value="http://127.0.0.1:50200" autocomplete="off">
        </label>
        <label id="languageLabel">
          语言
          <select id="languageSelect">
            <option value="cnzh">中文-简体</option>
            <option value="twzh">中文-繁体</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ar">العربية</option>
            <option value="ru">Русский</option>
          </select>
        </label>
        <button id="refreshAll" class="secondary" type="button">刷新</button>
      </div>
    </header>

    <main class="content">
      <div class="status-line" id="statusLine">正在加载面板配置...</div>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <h2 id="submitTitle">提交任务</h2>
            <span class="badge" id="submitState">空闲</span>
          </div>
          <div class="panel-body">
            <label id="sessionLabel">
              Session
              <input id="sessionId" value="panel" autocomplete="off">
            </label>
            <label id="taskLabel">
              任务描述
              <textarea id="taskInput" placeholder="例如：总结这个项目当前架构，并指出下一步最小改动"></textarea>
            </label>
            <label id="contextLabel">
              Context JSON
              <input id="contextJson" value="{}" autocomplete="off">
            </label>
            <div class="actions">
              <button id="submitTask" type="button">提交</button>
              <button id="clearOutput" class="secondary" type="button">清空输出</button>
            </div>
            <div class="output">
              <pre id="taskOutput">等待任务提交。</pre>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2 id="runtimeTitle">Runtime 状态</h2>
            <span class="badge" id="runtimeBadge">未知</span>
          </div>
          <div class="panel-body">
            <div class="workers" id="workers"></div>
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <h2 id="memoryTitle">最近记忆</h2>
            <span class="badge" id="memoryBadge">未加载</span>
          </div>
          <div class="panel-body">
            <div class="list" id="memoryList"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2 id="skillsTitle">技能摘要</h2>
            <span class="badge" id="skillsBadge">未加载</span>
          </div>
          <div class="panel-body">
            <div class="list" id="skillsList"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="historyTitle">任务历史</h2>
          <span class="badge" id="historyBadge">未加载</span>
        </div>
        <div class="panel-body">
          <div class="list" id="historyList"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2 id="runtimeTasksTitle">Runtime 队列</h2>
          <span class="badge" id="runtimeTasksBadge">未加载</span>
        </div>
        <div class="panel-body">
          <div class="list" id="runtimeTasksList"></div>
        </div>
      </section>
    </main>
  </div>

    function t(key, vars = {}) {
      const strings = LANGUAGES[currentLanguage].strings;
      const fallback = LANGUAGES.cnzh.strings;
      const template = strings[key] || fallback[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => String(vars[name] ?? ""));
    }

    function canonicalLanguage(value) {
      if (!value) {
        return "";
      }
      const key = String(value).trim().toLowerCase().replaceAll("_", "-");
      return LANGUAGES[key] ? key : (LANGUAGE_ALIASES[key] || "");
    }

    function setLabelText(label, text) {
      if (label && label.firstChild && label.firstChild.nodeType === Node.TEXT_NODE) {
        label.firstChild.nodeValue = `${text}\n          `;
      }
    }

    function applyLanguage() {
      const config = LANGUAGES[currentLanguage];
      document.documentElement.lang = config.htmlLang;
      document.documentElement.dir = config.dir;
      document.title = t("documentTitle");
      els.languageSelect.value = currentLanguage;

      if (els.statusLine.dataset.loaded) {
        els.statusLine.textContent = t("statusConnected", {path: els.statusLine.dataset.memoryPath || ""});

        els.statusLine.textContent = t("statusLoading");

    function runtimeAddr() {
      const value = els.runtimeAddr.value.trim() || "http://127.0.0.1:50200";
      localStorage.setItem("yizutt.runtimeAddr", value);
      return value;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: {"Content-Type": "application/json"},
        ...options
      });
      const data = await response.json();
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    function setBadge(el, text, kind = "") {
      el.className = `badge ${kind}`.trim();
      el.textContent = text;
    }

    function item(title, meta, body = "") {
      const node = document.createElement("div");
      node.className = "item";
      const safeBody = body ? `<pre>${escapeHtml(body)}</pre>` : "";
      node.innerHTML = `
        <div class="item-title">
          <span>${escapeHtml(title)}</span>
        </div>
        <div class="meta">${escapeHtml(meta)}</div>
        ${safeBody}
      `;
      return node;
    }

    function historyItem(run) {
      const node = document.createElement("div");
      node.className = "item";
      const title = document.createElement("div");
      title.className = "item-title";
      const name = document.createElement("span");
      name.textContent = run.task || `#${run.id}`;
      const button = document.createElement("button");
      button.type = "button";
      button.className = "secondary";
      button.textContent = t("replayButton");
      button.addEventListener("click", () => loadHistoryRun(run.id));
      title.append(name, button);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = t("historyMeta", {
        time: formatTime(run.started_at),
        session: run.session_id,
        status: run.status,
        count: run.trace_count
      });

      node.append(title, meta);
      if (run.trace_summary) {
        const body = document.createElement("pre");
        body.textContent = run.trace_summary;
        node.append(body);
      }
      return node;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime(epochSeconds) {
      if (!epochSeconds) {
        return "";
      }
      try {
        return new Intl.DateTimeFormat(LANGUAGES[currentLanguage].htmlLang, {
          dateStyle: "short",
          timeStyle: "medium"
        }).format(new Date(epochSeconds * 1000));
      } catch (_) {
        return new Date(epochSeconds * 1000).toLocaleString();
      }
    }

    async function loadConfig() {
      const data = await api("/api/config");
      if (!savedRuntime && data.runtime_addr) {
        els.runtimeAddr.value = data.runtime_addr;
      }
      if (!savedLanguage) {
        const defaultLanguage = canonicalLanguage(data.default_language);
        if (defaultLanguage && defaultLanguage !== currentLanguage) {
          currentLanguage = defaultLanguage;
          applyLanguage();
        }
      }
      els.statusLine.dataset.loaded = "true";
      els.statusLine.dataset.memoryPath = data.memory_path;
      els.statusLine.textContent = t("statusConnected", {path: data.memory_path});
    }

    async function refreshStatus() {
      setBadge(els.runtimeBadge, t("checking"));
      els.workers.innerHTML = "";
      try {
        const data = await api(`/api/status?runtime_addr=${encodeURIComponent(runtimeAddr())}`);
        const workers = data.workers || [];
        setBadge(els.runtimeBadge, t("workersCount", {count: workers.length}), "ok");
        if (!workers.length) {
          els.workers.append(item(t("noWorkerTitle"), t("noWorkerMeta")));
          return;

        for (const worker of workers) {
          const health = worker.healthy ? t("healthy") : t("unhealthy");
          const meta = t("workerMeta", {address: worker.address, inflight: worker.inflight});
          els.workers.append(item(`${worker.worker_id} · ${health}`, meta));

      } catch (err) {
        setBadge(els.runtimeBadge, t("unavailable"), "error");
        els.workers.append(item(t("runtimeUnavailable"), err.message));
      }
    }

    async function submitTask() {
      const task = els.taskInput.value.trim();
      if (!task) {
        els.taskOutput.dataset.hasResult = "";
        els.taskOutput.textContent = t("taskRequired");
        return;
      }
      setBadge(els.submitState, t("running"), "warn");
      els.submitTask.disabled = true;
      els.taskOutput.dataset.hasResult = "true";
      els.taskOutput.textContent = t("taskSubmitted");
      try {
        const finalEvent = await streamSubmit({
          runtime_addr: runtimeAddr(),
          session_id: els.sessionId.value.trim() || "panel",
          task,
          context_json: els.contextJson.value.trim() || "{}"
        });
        if (finalEvent && finalEvent.ok === false) {
          setBadge(els.submitState, t("failed"), "error");
        } else {
          setBadge(els.submitState, t("complete"), "ok");
        }
        await Promise.allSettled([refreshStatus(), refreshMemory(), refreshSkills(), refreshHistory(), refreshRuntimeTasks()]);
      } catch (err) {
        setBadge(els.submitState, t("failed"), "error");
        appendOutputLine(`\n${t("error")}: ${err.message}`);
      } finally {
        els.submitTask.disabled = false;
      }
    }

    async function streamSubmit(payload) {
      const response = await fetch("/api/submit-stream", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      if (!response.ok || !response.body) {
        const text = await response.text();
        throw new Error(text || `HTTP ${response.status}`);
      }
      els.taskOutput.textContent = "";
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let finalEvent = null;
      while (true) {
        const {value, done} = await reader.read();
        if (done) {
          break;
        }
        buffer += decoder.decode(value, {stream: true});
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";
        for (const part of parts) {
          const event = parseSseEvent(part);
          if (!event) {
            continue;
          }
          const handled = handleStreamEvent(event);
          if (handled) {
            finalEvent = handled;
            await reader.cancel();
            return finalEvent;
          }
        }
      }
      if (buffer.trim()) {
        const event = parseSseEvent(buffer);
        finalEvent = handleStreamEvent(event) || finalEvent;
      }
      return finalEvent;
    }

    async function loadHistoryRun(id) {
      const data = await api(`/api/history/run?id=${encodeURIComponent(id)}`);
      const run = data.item;
      els.runtimeAddr.value = run.runtime_addr || runtimeAddr();
      els.sessionId.value = run.session_id || "panel";
      els.taskInput.value = run.task || "";
      els.contextJson.value = run.context_json || "{}";
      els.taskOutput.dataset.hasResult = "true";
      els.taskOutput.textContent = "";
      setBadge(els.submitState, t("replayLoaded"), run.ok === false ? "error" : "ok");
      for (const event of run.trace || []) {
        handleStreamEvent(event);
      }
    }

    function parseSseEvent(block) {
      const lines = block.split("\n");
      const dataLines = lines
        .filter((line) => line.startsWith("data:"))
        .map((line) => line.slice(5).trimStart());
      if (!dataLines.length) {
        return null;
      }
      return JSON.parse(dataLines.join("\n"));
    }

    function handleStreamEvent(event) {
      if (!event) {
        return null;
      }
      if (event.type === "started") {
        appendOutputLine(`# ${event.session_id} @ ${event.runtime_addr}`);
        return null;
      }
      if (event.type === "line") {
        appendOutputLine(event.text);
        return null;
      }
      if (event.type === "finished") {
        appendOutputLine(`\n# exit_code: ${event.exit_code}`);
        if (event.stderr) {
          appendOutputLine(`# stderr: ${event.stderr}`);
        }
        return event;
      }
      if (event.type === "error") {
        appendOutputLine(`\n${t("error")}: ${event.error}`);
        return {ok: false};
      }
      appendOutputLine(JSON.stringify(event));
      return null;
    }

    function appendOutputLine(text) {
      els.taskOutput.textContent += `${text}\n`;
      const box = els.taskOutput.closest(".output");
      if (box) {
        box.scrollTop = box.scrollHeight;
      }
    }

    function formatTimeIso(value) {
      if (!value) {
        return "";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value);
      }
      try {
        return new Intl.DateTimeFormat(LANGUAGES[currentLanguage].htmlLang, {
          dateStyle: "short",
          timeStyle: "medium"
        }).format(date);
      } catch (_) {
        return date.toLocaleString();
      }
    }

    els.refreshAll.addEventListener("click", refreshAll);
    els.submitTask.addEventListener("click", submitTask);
    els.clearOutput.addEventListener("click", () => {
      els.taskOutput.dataset.hasResult = "";
      els.taskOutput.textContent = t("taskWaiting");
      setBadge(els.submitState, t("idle"));
    });
    els.runtimeAddr.addEventListener("change", refreshStatus);
    els.languageSelect.addEventListener("change", async () => {
      currentLanguage = canonicalLanguage(els.languageSelect.value) || "cnzh";
      localStorage.setItem("yizutt.language", currentLanguage);
      applyLanguage();
      await refreshAll();
    });

    applyLanguage();
    loadConfig()
      .catch((err) => {
        els.statusLine.dataset.loaded = "";
        els.statusLine.textContent = err.message;
        els.statusLine.className = "status-line error";
      })
      .finally(refreshAll);
  </script>
</body>
</html>
